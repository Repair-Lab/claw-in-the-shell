# =============================================================================
# Fail2Ban Filter: API Login-Fehler
# =============================================================================

[Definition]

failregex = ^.*"POST /api/auth/login.*" 401.*"<HOST>".*$
            ^.*"POST /api/auth/login.*" 403.*"<HOST>".*$
            ^.*Authentication failed.*source_ip=<HOST>.*$
            ^.*Invalid credentials.*ip=<HOST>.*$

ignoreregex = ^.*127\.0\.0\.1.*$

datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S
