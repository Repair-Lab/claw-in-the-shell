# =============================================================================
# Fail2Ban Filter: PostgreSQL Authentifizierungsfehler
# =============================================================================
# Erkennt fehlgeschlagene Logins am SQL-Port.
# Verknüpft mit dbai_security.failed_auth_log.
# =============================================================================

[Definition]

# PostgreSQL Log-Format:
# 2026-03-21 10:00:00.000 UTC [12345] FATAL:  password authentication failed for user "hacker"
# 2026-03-21 10:00:00.000 UTC [12345] DETAIL:  Connection matched pg_hba.conf line 5: "host all all 0.0.0.0/0 scram-sha-256"
# 2026-03-21 10:00:00.000 UTC [12345] LOG:  connection received: host=192.168.1.100 port=54321

failregex = ^.*FATAL:\s+password authentication failed for user ".*".*host=<HOST>.*$
            ^.*FATAL:\s+no pg_hba\.conf entry for host "<HOST>".*$
            ^.*FATAL:\s+role ".*" does not exist.*host=<HOST>.*$
            ^.*LOG:\s+connection received:.*host=<HOST>.*password authentication failed.*$

ignoreregex = ^.*host=127\.0\.0\.1.*$
              ^.*host=172\.28\..*$
              ^.*host=::1.*$

datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S
