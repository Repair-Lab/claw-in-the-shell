# =============================================================================
# Fail2Ban Filter: Port-Scan-Erkennung
# =============================================================================

[Definition]

failregex = ^.*kernel:.*SRC=<HOST>.*DPT=.*$
            ^.*UFW BLOCK.*SRC=<HOST>.*$
            ^.*iptables.*DROP.*SRC=<HOST>.*$

ignoreregex = ^.*SRC=127\.0\.0\.1.*$
              ^.*SRC=172\.28\..*$

datepattern = {^LN-BEG}
