# =============================================================================
# DBAI Fail2Ban — Jail-Konfiguration
# =============================================================================
# Verknüpft PostgreSQL-Logs mit automatischer IP-Sperre.
# 3 Fehlversuche in 5 Minuten → 24 Stunden Ban auf Hardware-Ebene.
# =============================================================================

[DEFAULT]
# Ban-Parameter
bantime  = 86400    # 24 Stunden Ban
findtime = 300      # 5 Minuten Zeitfenster
maxretry = 3        # 3 Fehlversuche

# Action: iptables + DB-Logging
banaction = dbai-iptables-multiport
action = %(action_)s
         dbai-db-log[name=%(__name__)s]

# Ignoriere interne IPs
ignoreip = 127.0.0.1/8 ::1 172.28.0.0/16

# Log-Backend
backend = auto


# ─── PostgreSQL Brute-Force ─────────────────────────────────────
[dbai-postgresql]
enabled  = true
port     = 5432
filter   = dbai-postgresql
logpath  = /var/lib/postgresql/data/log/postgresql-*.log
maxretry = 3
findtime = 300
bantime  = 86400


# ─── API Brute-Force (Login-Endpunkt) ──────────────────────────
[dbai-api]
enabled  = true
port     = 3000
filter   = dbai-api
logpath  = /var/log/dbai/api-access.log
maxretry = 5
findtime = 300
bantime  = 3600     # 1 Stunde


# ─── SSH Brute-Force ───────────────────────────────────────────
[dbai-ssh]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
maxretry = 3
findtime = 600
bantime  = 604800   # 7 Tage


# ─── Port-Scan-Erkennung ──────────────────────────────────────
[dbai-portscan]
enabled  = true
filter   = dbai-portscan
logpath  = /var/log/syslog
maxretry = 5
findtime = 60
bantime  = 604800   # 7 Tage


# ─── Wiederholte Fehler (Allgemein) ────────────────────────────
[dbai-recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
maxretry = 3
findtime = 86400    # 24 Stunden
bantime  = 2592000  # 30 Tage (Wiederholungstäter)
