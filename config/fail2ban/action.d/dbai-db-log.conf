# =============================================================================
# Fail2Ban Action: DBAI-Datenbank-Logging
# =============================================================================
# Schreibt Ban/Unban-Events direkt in die PostgreSQL-Datenbank.
# =============================================================================

[Definition]

actionstart =

actionstop =

actioncheck =

actionban = psql -h postgres -U dbai_system -d dbai -c \
    "INSERT INTO dbai_security.ip_bans (ip_address, reason, ban_type, source, expires_at) \
     VALUES ('<ip>', 'Fail2Ban: <name> — <failures> Fehlversuche in <findtime>s', 'temporary', 'fail2ban', \
     now() + interval '<bantime> seconds') \
     ON CONFLICT (ip_address, cidr_mask) DO UPDATE SET \
     is_active = TRUE, banned_at = now(), reason = EXCLUDED.reason, \
     expires_at = EXCLUDED.expires_at; \
     INSERT INTO dbai_security.security_responses \
     (trigger_type, response_type, description, details) VALUES \
     ('failed_auth', 'ip_ban', \
      'Fail2Ban Ban: <ip> wegen <name>', \
      '{\"ip\": \"<ip>\", \"jail\": \"<name>\", \"failures\": <failures>, \"bantime\": <bantime>}'::jsonb);"

actionunban = psql -h postgres -U dbai_system -d dbai -c \
    "UPDATE dbai_security.ip_bans SET is_active = FALSE, \
     unban_reason = 'Fail2Ban Unban: Ban abgelaufen', unbanned_at = now() \
     WHERE ip_address = '<ip>'::inet AND is_active = TRUE;"

[Init]
