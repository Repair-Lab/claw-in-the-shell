# =============================================================================
# PostgreSQL Client-Authentifizierung für DBAI
# Keine Passwörter im herkömmlichen Sinn — Zertifikats-basiert
# =============================================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Lokale Verbindungen — nur Unix Socket, Peer-Authentifizierung
local   dbai            dbai_system                             peer
local   dbai            dbai_monitor                            peer
local   dbai            dbai_llm                                peer
local   dbai            dbai_recovery                           peer

# Loopback — nur von localhost, SCRAM-SHA-256
host    dbai            dbai_system     127.0.0.1/32            scram-sha-256
host    dbai            dbai_monitor    127.0.0.1/32            scram-sha-256
host    dbai            dbai_llm        127.0.0.1/32            scram-sha-256
host    dbai            dbai_recovery   127.0.0.1/32            scram-sha-256

# KEINE externen Verbindungen erlaubt
# host  all             all             0.0.0.0/0               reject
