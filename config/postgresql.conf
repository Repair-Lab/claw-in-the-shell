# =============================================================================
# PostgreSQL Konfiguration für DBAI
# Optimiert für tabellenbasiertes KI-Betriebssystem
# =============================================================================

# --- Verbindungen ---
listen_addresses = '127.0.0.1'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# --- Speicher ---
shared_buffers = '4GB'
effective_cache_size = '12GB'
work_mem = '256MB'
maintenance_work_mem = '1GB'
huge_pages = 'try'

# --- WAL (Write-Ahead Logging) auf separater Disk ---
wal_level = 'replica'
max_wal_size = '4GB'
min_wal_size = '1GB'
wal_buffers = '64MB'
checkpoint_timeout = '30s'
checkpoint_completion_target = 0.9

# WAL-Archivierung für PITR
archive_mode = on
archive_command = 'cp %p /mnt/backup_disk/dbai_wal_archive/%f'

# Synchrones Schreiben — Datensicherheit über Performance
fsync = on
synchronous_commit = on
full_page_writes = on

# --- Autovacuum (kritisch für Append-Only System) ---
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = '30s'
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = '2ms'

# --- Logging ---
logging_collector = on
log_directory = 'log'
log_filename = 'dbai-%Y-%m-%d_%H%M%S.log'
log_rotation_age = '1d'
log_rotation_size = '100MB'
log_min_duration_statement = 100
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'ddl'

# --- Row-Level Security ---
row_security = on

# --- Deadlock-Erkennung ---
deadlock_timeout = '1s'
lock_timeout = '10s'
statement_timeout = '60s'

# --- Shared Preload Libraries ---
shared_preload_libraries = 'pg_stat_statements,vector'

# --- Statistiken ---
track_activities = on
track_counts = on
track_io_timing = on
track_functions = 'all'
