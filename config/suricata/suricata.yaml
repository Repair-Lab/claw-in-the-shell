# =============================================================================
# DBAI Suricata IDS — Basis-Konfiguration
# =============================================================================
# Minimale Konfiguration für den Kali-Sidecar-Container.
# Regeln werden automatisch per suricata-update aktualisiert.
# =============================================================================

%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[172.28.0.0/16,192.168.0.0/16,10.0.0.0/8]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "3000,5173,8080"
    SQL_PORTS: "5432"
    SSH_PORTS: "22,2222"

default-log-dir: /var/log/suricata/

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            payload: yes
            payload-printable: yes
            packet: yes
            metadata: yes
        - anomaly:
            enabled: yes
        - http:
            extended: yes
        - dns
        - tls:
            extended: yes
        - flow
        - ssh
        - stats:
            totals: yes
            threads: no

  - stats:
      enabled: yes
      filename: stats.log
      interval: 30

af-packet:
  - interface: eth0
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25

app-layer:
  protocols:
    http:
      enabled: yes
    tls:
      enabled: yes
    ssh:
      enabled: yes
    dns:
      tcp:
        enabled: yes
      udp:
        enabled: yes
    pgsql:
      enabled: yes

# Regeln
default-rule-path: /etc/suricata/rules/

rule-files:
  - suricata.rules

# Performance
threading:
  set-cpu-affinity: no
  detect-thread-ratio: 1.0
