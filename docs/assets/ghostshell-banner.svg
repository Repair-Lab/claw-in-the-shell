<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00ff41;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#00ffcc">
    <line x1="0" y1="50" x2="800" y2="50" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke-width="0.5"/>
  </g>

  <!-- Data Cube (Logo) -->
  <g transform="translate(120, 100)" filter="url(#softglow)">
    <!-- Cube faces -->
    <polygon points="0,-35 30,-18 30,18 0,35 -30,18 -30,-18" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
    <line x1="-30" y1="-18" x2="30" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
    <line x1="30" y1="-18" x2="-30" y2="18" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
    <!-- Core glow -->
    <circle cx="0" cy="0" r="8" fill="#00ffcc" opacity="0.6" filter="url(#softglow)"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.9"/>
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="42" ry="12" fill="none" stroke="#00ff41" stroke-width="0.8" opacity="0.3" transform="rotate(-20)"/>
  </g>

  <!-- Title -->
  <text x="200" y="82" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="url(#glow)" filter="url(#neon)">GhostShell OS</text>

  <!-- Subtitle -->
  <text x="200" y="115" font-family="'Courier New', monospace" font-size="14" fill="#00ffcc" opacity="0.7">The Ghost is the Logic. The Database is the Shell.</text>

  <!-- Version tag -->
  <rect x="200" y="130" width="70" height="20" rx="4" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <text x="210" y="144" font-family="'Courier New', monospace" font-size="11" fill="#00ff41" opacity="0.7">G.S.O.S.</text>

  <!-- Tech badges -->
  <g transform="translate(290, 130)" opacity="0.5">
    <rect width="90" height="20" rx="4" fill="none" stroke="#336791" stroke-width="1"/>
    <text x="8" y="14" font-family="'Courier New', monospace" font-size="10" fill="#336791">PostgreSQL</text>
  </g>
  <g transform="translate(395, 130)" opacity="0.5">
    <rect width="65" height="20" rx="4" fill="none" stroke="#00ffcc" stroke-width="1"/>
    <text x="8" y="14" font-family="'Courier New', monospace" font-size="10" fill="#00ffcc">React</text>
  </g>
  <g transform="translate(475, 130)" opacity="0.5">
    <rect width="70" height="20" rx="4" fill="none" stroke="#00ff41" stroke-width="1"/>
    <text x="8" y="14" font-family="'Courier New', monospace" font-size="10" fill="#00ff41">FastAPI</text>
  </g>

  <!-- Decorative data streams (right side) -->
  <g opacity="0.15" font-family="'Courier New', monospace" font-size="9" fill="#00ffcc">
    <text x="620" y="30">SELECT * FROM ghost_thoughts</text>
    <text x="640" y="50">UPDATE cpu SET governor=...</text>
    <text x="610" y="70">INSERT INTO proposed_actions</text>
    <text x="650" y="90">NOTIFY action_proposed</text>
    <text x="620" y="110">BEGIN; -- ACID transaction</text>
    <text x="640" y="130">COMMIT; -- permanent</text>
    <text x="610" y="150">SELECT verify_integrity()</text>
    <text x="650" y="170">-- Repair-Lab · 2026</text>
  </g>

  <!-- Border glow -->
  <rect width="800" height="200" fill="none" stroke="#00ffcc" stroke-width="1" rx="12" opacity="0.15"/>
</svg>
