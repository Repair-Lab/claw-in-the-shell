<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostShell — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: #0a0a0f;
      color: #00ff88;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .ghost {
      font-size: 6rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #00ff88;
    }
    p {
      color: #8892b0;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid #00ff8844;
      border-radius: 8px;
      color: #ffaa00;
      font-size: 0.85rem;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #00ff8822;
      color: #00ff88;
      border: 1px solid #00ff88;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #00ff8844;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="ghost">👻</div>
    <h1>GhostShell Offline</h1>
    <p>Keine Verbindung zum Ghost-Kernel.<br>
    Stelle sicher, dass der Stick eingesteckt ist oder verbinde dich mit dem GhostShell-WLAN.</p>
    <div class="status">⚡ Warte auf Verbindung...</div>
    <br>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
  <script>
    // Auto-Retry alle 5 Sekunden
    setInterval(() => {
      fetch('/api/health')
        .then(r => { if (r.ok) location.reload(); })
        .catch(() => {});
    }, 5000);
  </script>
</body>
</html>
